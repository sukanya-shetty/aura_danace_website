<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="adminstyle.css" type="text/css"></link>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" integrity="sha384-DyZ88mC6Up2uqS4h/KRgHuoeGwBcD4Ng9SiP4dIRy0EXTlnuz47vAwmeGwVChigm" crossorigin="anonymous"/>
    <title>Admin Panel</title>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div class="logo">
                <img src="download-removebg-preview.png" alt="download-removebg-preview">
            </div>
            <div class="user">
                <img src="uimage.png" alt="1">
            </div>
        </div>
        <div class="sidebar">
            <ul>
                <li>
                    <a href="">
                        <i class="fas fa-th-large"></i>
                        <div>Dashboard</div>
                    </a>
                </li>
            </ul>

            <ul>
                <li>
                    <a href="">
                        <i class="fas fa-user-graduate"></i>
                        <div>Students</div>
                    </a>
                </li>
            </ul>

            <ul>
                <li>
                    <a href="">
                        <i class="fas fa-calendar"></i>
                        <div>Events</div>
                    </a>
                </li>
            </ul>

            <ul>
                <li>
                    <a href="#">
                        <i class="fas fa-hand-holding-usd"></i>
                        <div>Earnings</div>
                    </a>
                </li>
            </ul>
        </div>
        <div class="main">
            <div class="cards">
                <div class="card">
                    <div class="card-content">
                        <div class="number">1217</div>
                        <div class="card-name">Students</div>
                    </div>
                    <div class="icon-box">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                </div>

                <div class="card">
                    <div class="card-content">
                        <div class="number">4</div>
                        <div class="card-name">Events</div>
                    </div>
                    <div class="icon-box">
                        <i class="fas fa-calendar"></i>
                    </div>
                </div>

                <div class="card">
                    <div class="card-content">
                        <div class="number">44</div>
                        <div class="card-name">Bharathanatyam</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-content">
                        <div class="number">4</div>
                        <div class="card-name">Students</div>
                    </div>
                    <div class="icon-box">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
