<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" >
        <link rel="stylesheet" href="style1.css">
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Dance Form</title>
    <style>
        /* Your CSS styles here */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(1);
            }
            to {
                transform: scale(1.05);
            }
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            background-image: url('light.avif');
            background-size: cover;
            background-position: center;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.5s ease-in-out;
        }

        .form h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        input[type="date"],
        textarea,
        select,
        button {
            width: 100%;
            padding: 15px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            color: #333333;
            outline: none;
            transition: transform 0.2s ease-in-out;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        textarea:focus,
        select:focus,
        button:focus {
            border-color: #007bff;
        }

        input[type="text"]:hover,
        input[type="email"]:hover,
        input[type="tel"]:hover,
        input[type="number"]:hover,
        input[type="date"]:hover,
        textarea:hover,
        select:hover,
        button:hover {
            animation: scaleIn 0.2s forwards;
        }

        button {
            background-color: #007bff;
            color: #ffffff;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        @media (max-width: 768px) {
            .form {
                padding: 20px;
            }
        }

        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .popup input[type="text"] {
            margin-bottom: 10px;
        }

        .popup button {
            background-color: #007bff;
            color: #ffffff;
            border: none;
            cursor: pointer;
            padding: 10px 20px;
            transition: background-color 0.3s;
        }

        .popup button:hover {
            background-color: #0056b3;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" ></script>
    <div class="container">
        <form id="danceForm" class="form" action="sangeet.php" method="POST">
            <h2>Dance Form</h2>
            <div class="form-group">
                <input type="text" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <input type="tel" name="phone" maxlength="10" placeholder="Your Phone Number" required>
            </div>
            <div class="form-group">
                <input type="text" name="district" placeholder="Your District" required>
            </div>
            <div class="form-group">
                <input type="date" name="sangeetDate" required>
            </div>
            <div class="form-group">
                <select name="time" required>
                    <option value="">Select Time</option>
                    <option value="morning">Morning</option>
                    <option value="evening">Evening</option>
                </select>
            </div>
            <div class="form-group">
                <input type="number" name="peopleCount" placeholder="Number of People" required>
            </div>
            <div class="form-group">
                <textarea name="address" placeholder="Your Address" required></textarea>
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="popup" id="paymentPopup">
        <h3>Payment</h3>
        <p style="color:black;">Amount: Rs. 500</p>
        <input type="text" id="cardNumber" name="cardNumber" placeholder="Card Number" maxlength="11" required>
        <button id="payButton">Pay</button>
    </div>

    <script>
        document.getElementById('danceForm').addEventListener('submit', function(event) {
            event.preventDefault();

            // Show payment popup
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('paymentPopup').style.display = 'block';
        });

        document.getElementById('payButton').addEventListener('click', function() {
            var cardNumber = document.getElementById('cardNumber').value;
            
            if (cardNumber.trim() === '' || cardNumber.length !== 11) {
                alert('Please enter a valid card number (11 digits).');
                return;
            }

            // Submit the form after payment validation
            document.getElementById('danceForm').submit();
        });
    </script>
</body>
</html>
